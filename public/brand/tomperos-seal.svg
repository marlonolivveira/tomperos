<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="220" height="220" role="img" aria-label="Selo Tomperos — Temperos Artesanais">
  <defs>
    <path id="arcTop" d="M 36,110 a 74,74 0 0 1 148,0"/>
    <path id="arcBot" d="M 40,110 a 70,70 0 0 0 140,0"/>
  </defs>

  <!-- anéis -->
  <circle cx="110" cy="110" r="105" fill="none" stroke="#241811" stroke-width="2.5"/>
  <circle cx="110" cy="110" r="95" fill="none" stroke="#c1440e" stroke-width="1.4"/>

  <!-- texto curvo -->
  <text fill="#241811" font-family="'Playfair Display', Georgia, 'Times New Roman', serif" font-weight="600" letter-spacing="4" font-size="20">
    <textPath href="#arcTop" startOffset="50%" text-anchor="middle">TOMPEROS</textPath>
  </text>
  <text fill="#241811" font-family="Georgia, 'Times New Roman', serif" letter-spacing="4.5" font-size="12">
    <textPath href="#arcBot" startOffset="50%" text-anchor="middle">TEMPEROS ARTESANAIS</textPath>
  </text>

  <!-- separadores -->
  <circle cx="34" cy="110" r="2.6" fill="#c1440e"/>
  <circle cx="186" cy="110" r="2.6" fill="#c1440e"/>

  <!-- pilão central -->
  <g transform="translate(110 110) scale(1.55) translate(-32 -30)">
    <path d="M13,31 C13,45 21,52 32,52 C43,52 51,45 51,31 Z" fill="#241811"/>
    <ellipse cx="32" cy="31" rx="19" ry="5.2" fill="#c1440e"/>
    <ellipse cx="32" cy="30.2" rx="9" ry="2.8" fill="#e0a526"/>
    <line x1="34" y1="33" x2="50" y2="12" stroke="#241811" stroke-width="7" stroke-linecap="round"/>
    <circle cx="33" cy="32" r="5" fill="#241811"/>
  </g>
</svg>
